name: PHP tests
on: [push, pull_request]
concurrency:
  group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
    # Check there is no syntax errors in the project
    php-linter:
        name: PHP Syntax check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: PHP syntax checker 8.1
              uses: prestashop/github-action-php-lint/8.1@master

            - name: PHP syntax checker 8.2
              uses: prestashop/github-action-php-lint/8.2@master

            - name: PHP syntax checker 8.3
              uses: prestashop/github-action-php-lint/8.3@master

            - name: PHP syntax checker 8.4
              uses: prestashop/github-action-php-lint/8.4@master

            - name: PHP syntax checker 8.5
              uses: prestashop/github-action-php-lint/8.5@master

    # Check the PHP code follow the coding standards
    php-cs-fixer:
        name: PHP-CS-Fixer
        runs-on: ubuntu-latest
        steps:
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                php-version: '8.1'

            - name: Checkout
              uses: actions/checkout@v4

            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                path: vendor
                key: php-${{ hashFiles('composer.lock') }}

            - name: Install dependencies
              run: composer install

            - name: Run PHP-CS-Fixer
              run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

    license-headers:
      name: Check license headers
      runs-on: ubuntu-latest
      steps:
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.1'

        - name: Checkout
          uses: actions/checkout@v4

        - name: Cache dependencies
          uses: actions/cache@v3
          with:
            path: vendor
            key: php-${{ hashFiles('composer.lock') }}

        - name: Install dependencies
          run: composer install

        - name: Run header-stamp
          run: composer header-stamp

    phpunit:
      name: PHPUnit Tests
      runs-on: ubuntu-latest
      steps:
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.1'

        - name: Checkout
          uses: actions/checkout@v4

        - name: Cache dependencies
          uses: actions/cache@v3
          with:
            path: vendor
            key: php-${{ hashFiles('composer.lock') }}

        - name: Install dependencies
          run: composer install

        - name: Run PHPUnit tests
          run: php vendor/bin/phpunit -c tests/Unit/phpunit.xml

    rector:
      name: Rector Dry Run
      runs-on: ubuntu-latest
      steps:
        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.1'

        - name: Checkout
          uses: actions/checkout@v4

        - name: Cache dependencies
          uses: actions/cache@v3
          with:
            path: vendor
            key: php-${{ hashFiles('composer.lock') }}

        - name: Install dependencies
          run: composer install

        - name: Run Rector dry-run
          run: composer rector

    phpstan:
      name: PHPStan (${{ matrix.presta_version }})
      runs-on: ubuntu-latest
      strategy:
          matrix:
              presta_version: ['9.0.3', '9.1.x', 'develop', '9.2.x']
          fail-fast: false
      env:
          PHPRC: ${{ github.workspace }}/${{ github.event.repository.name }}/.phpstan-php-ini
      steps:
          - name: Checkout repository
            uses: actions/checkout@v4
            with:
                path: ${{ github.event.repository.name }}

          - name: Prepare PHP env (define constants before bootstrap)
            run: |
                mkdir -p ${{ github.event.repository.name }}/.phpstan-php-ini
                {
                  echo "auto_prepend_file=$GITHUB_WORKSPACE/${{ github.event.repository.name }}/tests/PHPStan/prepend-constants.php"
                  echo "memory_limit=512M"
                } > ${{ github.event.repository.name }}/.phpstan-php-ini/php.ini

          - name: Run PHPStan
            uses: PrestaShop/.github/.github/actions/php-ci/phpstan@master
            with:
                php-version: '8.1'
                presta-version: ${{ matrix.presta_version }}
                module-name: ${{ github.event.repository.name }}
                phpstan-level: '5'
                phpstan-config: tests/PHPStan/phpstan-${{ matrix.presta_version }}.neon
                phpstan-config-merge: 'false'
