services:
  _defaults:
    public: false
    autowire: true

  PrestaShop\Module\APIResources\List\ModuleQueryBuilder:
    parent: 'prestashop.core.grid.abstract_query_builder'
    autowire: true

  prestashop.core.grid.data_factory.hook:
    class: '%prestashop.core.grid.data.factory.doctrine_grid_data_factory%'
    public: true
    arguments:
      - '@prestashop.core.api.query_builder.hook'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.core.grid.query.doctrine_query_parser'
      - 'hook'

  prestashop.core.grid.data_factory.module:
    class: PrestaShop\Module\APIResources\List\ModuleGridDataFactory
    public: true
    arguments:
      - '@PrestaShop\Module\APIResources\List\ModuleQueryBuilder'
      - '@prestashop.core.hook.dispatcher'
      - '@prestashop.core.grid.query.doctrine_query_parser'
      - 'module'

  PrestaShop\Module\APIResources\Validation\IframeValidationGroupsResolver:
    arguments:
      - '@prestashop.adapter.legacy.configuration'

  # Validates the addressFormat string on the Country API resource.
  # Delegates to the core AddressFormatCheckerInterface when present (PS 9.2+);
  # on older PrestaShop versions the alias is missing, the argument resolves
  # to null and the validator becomes a no-op (backward-compatible behavior).
  PrestaShop\Module\APIResources\Validation\Constraints\ValidAddressFormatValidator:
    autoconfigure: true
    arguments:
      $checker: '@?PrestaShop\PrestaShop\Core\Domain\Country\AddressFormat\AddressFormatCheckerInterface'

  PrestaShop\Module\APIResources\Command\GenerateApiTrackingTableCommand:
    tags:
      - { name: 'console.command' }

  # Custom normalizers for commands/queries that are very specific and cannot rely on generic solutions from the core
  PrestaShop\Module\APIResources\ApiPlatform\Normalizer\GenerateCombinationsSerializer:
    autowire: true
    autoconfigure: true
    public: false

  PrestaShop\Module\APIResources\ApiPlatform\Normalizer\GetSearchTermAliasesQuerySerializer:
    autoconfigure: true

  # AddProductToOrderCommand has a private constructor and only accepts
  # orderInvoiceId / hasFreeShipping through named constructors — see the
  # class docblock on AddProductToOrderProcessor for the details.
  PrestaShop\Module\APIResources\ApiPlatform\Processor\AddProductToOrderProcessor:
    autowire: true
    autoconfigure: true
    public: true

  PrestaShopBundle\ApiPlatform\Serializer\CQRSApiSerializer:
    class: PrestaShop\Module\APIResources\Serializer\QueryParameterTypeCastSerializer
    decorates: 'api_platform.serializer'
    autowire: true
    arguments:
      $decorated: '@.inner'
